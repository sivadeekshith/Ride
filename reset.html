<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password – NextRide</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #2d3a4e);
            display: flex;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui;
        }
        .card {
            border-radius: 32px;
            border: none;
            background: rgba(255,255,255,0.96);
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: #3b82f6;
            border-radius: 40px;
            border: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <h3 class="text-center mb-3">Set New Password</h3>
                <p class="text-muted text-center">For security, please set a new password.</p>
                <form id="resetForm">
                    <div class="mb-3">
                        <label class="form-label">New Password (min 8 chars)</label>
                        <input type="password" id="newPass" class="form-control" required minlength="8">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" id="confirmPass" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Password</button>
                </form>
                <div id="resetMessage" class="alert mt-3 d-none"></div>
            </div>
        </div>
    </div>
</div>

<script src="utils.js"></script>
<script>

    NextRideAPI.checkToken();

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPassword = document.getElementById('newPass').value;
        const confirmPassword = document.getElementById('confirmPass').value;
        
        if (newPassword !== confirmPassword) {
            showMessage('Passwords do not match.', true);
            return;
        }
        
        try {
            // Note: backend /auth/forgot expects email, but for firstLogin reset we could add /auth/reset-firstlogin/:user
            // For now use existing /forgot - user needs to know their email or modify backend
            const email = localStorage.getItem('currentUser') + '@nextride.com'; // fallback
            await NextRideAPI.apiCall('/auth/forgot', {
                method: 'POST',
                body: JSON.stringify({ email, newPassword })
            });
            
            localStorage.setItem('userRole', 'employee');
            localStorage.removeItem('resetUser');
            showMessage('Password updated successfully!', false);
            setTimeout(() => window.location.href = 'employee.html', 1500);
        } catch (error) {
            showMessage(error.message || 'Reset failed.', true);
        }
    });

    function showMessage(msg, isError) {
        const msgDiv = document.getElementById('resetMessage');
        msgDiv.textContent = msg;
        msgDiv.className = `alert ${isError ? 'alert-danger' : 'alert-success'} mt-3`;
        msgDiv.classList.remove('d-none');
        setTimeout(() => msgDiv.classList.add('d-none'), 3000);
    }
</script>
</body>
</html>
